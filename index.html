    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            padding: 30px 0;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
            margin-top: 30px;
        }

        .map-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .china-map {
            width: 100%;
            max-width: 700px;
            height: auto;
        }

        .province {
            cursor: pointer;
            transition: all 0.3s ease;
            fill: #e8e8e8;
            stroke: #ffffff;
            stroke-width: 0.5;
        }

        .province:hover {
            fill: #ff6b6b;
            filter: brightness(1.1);
        }

        .province.selected {
            fill: #ff4757;
        }

        .info-panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow-y: auto;
            max-height: 600px;
        }

        .info-panel h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #ff6b6b;
        }

        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .food-card {
            background: #f8f9fa;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .food-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .food-image {
            width: 100%;
            height: 120px;
            object-fit: cover;
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
        }

        .food-name {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            color: #333;
            font-size: 1em;
        }

        .food-desc {
            padding: 0 15px 15px;
            font-size: 0.85em;
            color: #666;
            line-height: 1.4;
        }

        .welcome-message {
            text-align: center;
            padding: 50px 20px;
            color: #666;
        }

        .welcome-message .icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        /* SVG 地图样式 */
        svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        /* 响应式设计 */
        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .info-panel {
                max-height: none;
            }

            header h1 {
                font-size: 1.8em;
            }
        }

        /* 图片模态框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15em;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1001;
        }

        .close:hover {
            color: #ff6b6b;
        }

        /* 南海诸岛插图 */
        .south-china-sea {
            position: absolute;
            bottom: 20px;
            right: 40px;
            width: 150px;
        }
    </style>
</head>

        // 初始化地图
        function initMap() {
            document.getElementById('chinaMap').innerHTML = chinaMapSVG;
            
            // 添加点击事件
            document.querySelectorAll('.province').forEach(province => {
                province.addEventListener('click', function() {
                    const provinceId = this.getAttribute('data-province');
                    showProvinceInfo(provinceId);
                    
                    // 移除其他选中状态
                    document.querySelectorAll('.province').forEach(p => p.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });
        }

        // 显示省份美食信息
        function showProvinceInfo(provinceId) {
            const province = provinceFoods[provinceId];
            const infoPanel = document.getElementById('infoPanel');
            
            if (!province) {
                infoPanel.innerHTML = `
                    <div class="welcome-message">
                        <h2>暂无数据</h2>
                        <p>该省份的美食数据正在收集中...</p>
                    </div>
                `;
                return;
            }
            
            let foodsHTML = '';
            province.foods.forEach((food, index) => {
                foodsHTML += `
                    <div class="food-card" onclick="showFoodImage('${food.emoji}', '${food.name}')">
                        <div class="food-image">${food.emoji}</div>
                        <div class="food-name">${food.name}</div>
                        <div class="food-desc">${food.desc}</div>
                    </div>
                `;
            });
            
            infoPanel.innerHTML = `
                <h2>📍 ${province.name}美食</h2>
                <div class="food-grid">
                    ${foodsHTML}
                </div>
            `;
        }

        // 显示美食图片（模态框）
        function showFoodImage(emoji, name) {
            const modal = document.getElementById('imageModal');
            const modalContent = document.getElementById('modalImage');
            modal.style.display = 'flex';
            modalContent.innerHTML = emoji;
            modalContent.setAttribute('data-name', name);
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        // 点击模态框外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('imageModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initMap);
    </script>
