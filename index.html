        header { text-align: center; color: white; padding: 30px 0; }

        header p { font-size: 1.2em; opacity: 0.9; }
        .main-content { display: grid; grid-template-columns: 1fr 400px; gap: 30px; margin-top: 30px; }
        .map-container {
            background: white; border-radius: 20px; padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
        }
        .china-map {
            width: 100%;
            position: relative;
            background: #f5f5f5;
            border-radius: 10px;
            overflow: hidden;
        }
        .china-map img {
            width: 100%;
            height: auto;
            display: block;
        }
        .province-overlay {
            position: absolute;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 107, 107, 0);
            border: 2px solid transparent;
        }
        .province-overlay:hover {
            background: rgba(255, 107, 107, 0.3);
            border-color: #ff6b6b;
        }
        .province-overlay.selected {
            background: rgba(255, 71, 87, 0.4);
            border-color: #ff4757;
        }
        .province-label {
            position: absolute;
            font-size: 12px;
            color: #333;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            pointer-events: none;
            white-space: nowrap;
        }
        .info-panel {
            background: white; border-radius: 20px; padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow-y: auto; max-height: 600px;
        }
        .info-panel h2 { color: #333; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 3px solid #ff6b6b; }
        .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .food-card {
            background: #f8f9fa; border-radius: 15px; overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease; cursor: pointer;
        }
        .food-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .food-image {
            width: 100%; height: 120px;
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex; align-items: center; justify-content: center; font-size: 3em;
        }
        .food-name { padding: 15px; text-align: center; font-weight: bold; color: #333; }
        .food-desc { padding: 0 15px 15px; font-size: 0.85em; color: #666; line-height: 1.4; }
        .welcome-message { text-align: center; padding: 50px 20px; color: #666; }
        .welcome-message .icon { font-size: 4em; margin-bottom: 20px; }
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.8);
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 15em; border-radius: 10px; min-width: 300px; min-height: 300px;
        }
        .close {
            position: absolute; top: 20px; right: 35px; color: #f1f1f1;
            font-size: 40px; font-weight: bold; cursor: pointer; z-index: 1001;
        }
        .close:hover { color: #ff6b6b; }
        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
        }
        @media (max-width: 968px) {
            .main-content { grid-template-columns: 1fr; }
            .info-panel { max-height: none; }
            header h1 { font-size: 1.8em; }
        }

            shanghai: { left: 68, top: 38, width: 2, height: 2 },
            zhejiang: { left: 66, top: 42, width: 4, height: 4 },
            jiangxi: { left: 60, top: 43, width: 5, height: 5 },
            fujian: { left: 68, top: 45, width: 4, height: 6 },
            hunan: { left: 52, top: 45, width: 6, height: 6 },
            guangdong: { left: 58, top: 55, width: 8, height: 8 },
            guangxi: { left: 48, top: 53, width: 7, height: 7 },
            hainan: { left: 52, top: 68, width: 4, height: 4 },
            shaanxi: { left: 45, top: 35, width: 5, height: 5 }
        };

        // 创建省份点击区域
        function createProvinceOverlays() {
            const mapContainer = document.getElementById('chinaMap');
            const tooltip = document.getElementById('tooltip');

            Object.keys(provinceAreas).forEach(provinceId => {
                const area = provinceAreas[provinceId];
                const province = provinceFoods[provinceId];
                if (!province) return;

                const overlay = document.createElement('div');
                overlay.className = 'province-overlay';
                overlay.dataset.province = provinceId;
                overlay.style.left = area.left + '%';
                overlay.style.top = area.top + '%';
                overlay.style.width = area.width + '%';
                overlay.style.height = area.height + '%';
                overlay.title = province.name;

                // 悬停显示提示
                overlay.addEventListener('mouseenter', (e) => {
                    tooltip.style.display = 'block';
                    tooltip.textContent = province.name;
                    tooltip.style.left = (e.pageX + 10) + 'px';
                    tooltip.style.top = (e.pageY + 10) + 'px';
                });

                overlay.addEventListener('mousemove', (e) => {
                    tooltip.style.left = (e.pageX + 10) + 'px';
                    tooltip.style.top = (e.pageY + 10) + 'px';
                });

                overlay.addEventListener('mouseleave', () => {
                    tooltip.style.display = 'none';
                });

                // 点击事件
                overlay.addEventListener('click', function(e) {
                    e.stopPropagation();
                    showProvinceInfo(provinceId);
                    document.querySelectorAll('.province-overlay').forEach(p => p.classList.remove('selected'));
                    this.classList.add('selected');
                });

                mapContainer.appendChild(overlay);
            });
        }

        function showProvinceInfo(provinceId) {
            const province = provinceFoods[provinceId];
            const infoPanel = document.getElementById('infoPanel');
            if (!province) return;
            let foodsHTML = province.foods.map(food => `
                <div class="food-card" onclick="showFoodImage('${food.emoji}', '${food.name}')">
                    <div class="food-image">${food.emoji}</div>
                    <div class="food-name">${food.name}</div>
                    <div class="food-desc">${food.desc}</div>
                </div>
            `).join('');
            infoPanel.innerHTML = `<h2>📍 ${province.name}美食</h2><div class="food-grid">${foodsHTML}</div>`;
        }

        function showFoodImage(emoji, name) {
            const modal = document.getElementById('imageModal');
            const modalContent = document.getElementById('modalImage');
            modal.style.display = 'flex';
            modalContent.innerHTML = emoji;
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('imageModal')) closeModal();
        }

        // 页面加载完成后创建省份区域
        document.addEventListener('DOMContentLoaded', createProvinceOverlays);
    </script>
</body>
</html>
