        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; color: white; padding: 30px 0; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        header p { font-size: 1.2em; opacity: 0.9; }
        .main-content { display: grid; grid-template-columns: 1fr 400px; gap: 30px; margin-top: 30px; }
        .map-container {
            background: white; border-radius: 20px; padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .china-map { width: 100%; position: relative; }
        .china-map svg { width: 100%; height: auto; }
        .province-path {
            fill: #e8e8e8;
            stroke: #ffffff;
            stroke-width: 0.5;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .province-path:hover {
            fill: #ff6b6b;
            filter: brightness(1.1);
        }
        .province-path.selected {
            fill: #ff4757;
        }
        .info-panel {
            background: white; border-radius: 20px; padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow-y: auto; max-height: 600px;
        }
        .info-panel h2 { color: #333; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 3px solid #ff6b6b; }
        .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .food-card {
            background: #f8f9fa; border-radius: 15px; overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease; cursor: pointer;
        }
        .food-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .food-image {
            width: 100%; height: 120px;
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex; align-items: center; justify-content: center; font-size: 3em;
        }
        .food-name { padding: 15px; text-align: center; font-weight: bold; color: #333; }
        .food-desc { padding: 0 15px 15px; font-size: 0.85em; color: #666; line-height: 1.4; }
        .welcome-message { text-align: center; padding: 50px 20px; color: #666; }
        .welcome-message .icon { font-size: 4em; margin-bottom: 20px; }
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.8);
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 15em; border-radius: 10px; min-width: 300px; min-height: 300px;
        }
        .close {
            position: absolute; top: 20px; right: 35px; color: #f1f1f1;
            font-size: 40px; font-weight: bold; cursor: pointer; z-index: 1001;
        }
        .close:hover { color: #ff6b6b; }
        .tooltip {
            position: absolute; background: rgba(0,0,0,0.8); color: white;
            padding: 5px 10px; border-radius: 5px; font-size: 12px;
            pointer-events: none; z-index: 100; white-space: nowrap;
        }
        @media (max-width: 968px) {
            .main-content { grid-template-columns: 1fr; }
            .info-panel { max-height: none; }
            header h1 { font-size: 1.8em; }
        }

            guangdong: "M540,430 L620,420 L640,460 L610,500 L560,490 Z",
            hainan: "M580,520 L610,515 L615,540 L585,545 Z",
            hunan: "M490,340 L550,330 L570,370 L540,410 L500,400 Z",
            hubei: "M450,290 L520,280 L540,320 L510,360 L460,350 Z",
            jiangxi: "M540,340 L590,330 L610,370 L580,410 L540,390 Z",
            anhui: "M560,280 L610,270 L630,310 L600,350 L560,340 Z",
            jiangsu: "M600,270 L650,260 L670,300 L640,340 L600,330 Z",
            zhejiang: "M620,340 L670,330 L690,370 L660,400 L620,380 Z",
            shanghai: "M670,300 L685,295 L690,315 L675,320 Z",
            fujian: "M640,380 L680,370 L700,420 L670,450 L640,430 Z",
            taiwan: "M720,420 L750,410 L760,450 L730,460 Z"
        };

        // 创建省份 SVG 路径
        function createProvincePaths() {
            const provincesGroup = document.getElementById('provinces');
            const tooltip = document.getElementById('tooltip');

            Object.keys(provincePaths).forEach(provinceId => {
                const province = provinceFoods[provinceId];
                if (!province) return;

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", provincePaths[provinceId]);
                path.setAttribute("class", "province-path");
                path.setAttribute("data-province", provinceId);
                path.setAttribute("title", province.name);

                // 悬停提示
                path.addEventListener('mouseenter', (e) => {
                    tooltip.style.display = 'block';
                    tooltip.textContent = province.name;
                });
                path.addEventListener('mousemove', (e) => {
                    const rect = e.target.getBoundingClientRect();
                    tooltip.style.left = (e.clientX + 10) + 'px';
                    tooltip.style.top = (e.clientY + 10) + 'px';
                });
                path.addEventListener('mouseleave', () => {
                    tooltip.style.display = 'none';
                });

                // 点击事件
                path.addEventListener('click', function(e) {
                    e.stopPropagation();
                    showProvinceInfo(provinceId);
                    document.querySelectorAll('.province-path').forEach(p => p.classList.remove('selected'));
                    this.classList.add('selected');
                });

                provincesGroup.appendChild(path);
            });
        }

        function showProvinceInfo(provinceId) {
            const province = provinceFoods[provinceId];
            const infoPanel = document.getElementById('infoPanel');
            if (!province) return;
            let foodsHTML = province.foods.map(food => `
                <div class="food-card" onclick="showFoodImage('${food.emoji}', '${food.name}')">
                    <div class="food-image">${food.emoji}</div>
                    <div class="food-name">${food.name}</div>
                    <div class="food-desc">${food.desc}</div>
                </div>
            `).join('');
            infoPanel.innerHTML = `<h2>📍 ${province.name}美食</h2><div class="food-grid">${foodsHTML}</div>`;
        }

        function showFoodImage(emoji, name) {
            const modal = document.getElementById('imageModal');
            const modalContent = document.getElementById('modalImage');
            modal.style.display = 'flex';
            modalContent.innerHTML = emoji;
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('imageModal')) closeModal();
        }

        // 页面加载完成后创建省份路径
        document.addEventListener('DOMContentLoaded', createProvincePaths);
    </script>
</body>
