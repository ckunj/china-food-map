    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;

            padding: 20px;
        }

        header { text-align: center; color: white; padding: 30px 0; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        header p { font-size: 1.2em; opacity: 0.9; }
        .main-content { display: grid; grid-template-columns: 1fr 400px; gap: 30px; margin-top: 30px; }
        .map-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .china-map { width: 100%; }
        .china-map svg { width: 100%; height: auto; }
        .province {
            fill: #e8e8e8;
            stroke: #ffffff;
            stroke-width: 0.5;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .province:hover {
            fill: #ff6b6b;
            filter: brightness(1.1);
        }
        .province.selected {
            fill: #ff4757;
        }
        .info-panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow-y: auto;
            max-height: 600px;
        }
        .info-panel h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #ff6b6b;
        }
        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }
        .food-card {
            background: #f8f9fa;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        .food-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .food-image {
            width: 100%;
            height: 120px;
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
        }
        .food-name {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            color: #333;
        }
        .food-desc {
            padding: 0 15px 15px;
            font-size: 0.85em;
            color: #666;
            line-height: 1.4;
        }
        .welcome-message {
            text-align: center;
            padding: 50px 20px;
            color: #666;
        }
        .welcome-message .icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15em;
            border-radius: 10px;
            min-width: 300px;
            min-height: 300px;
        }
        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1001;
        }
        .close:hover { color: #ff6b6b; }
        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
        }
        @media (max-width: 968px) {
            .main-content { grid-template-columns: 1fr; }
            .info-panel { max-height: none; }
            header h1 { font-size: 1.8em; }
        }
    </style>
</head>

        // 初始化地图
        function initMap() {
            document.getElementById('chinaMap').innerHTML = chinaMapSVG;
            const tooltip = document.getElementById('tooltip');

            document.querySelectorAll('.province').forEach(province => {
                province.addEventListener('mouseenter', function(e) {
                    const name = this.getAttribute('title');
                    tooltip.style.display = 'block';
                    tooltip.textContent = name;
                });
                province.addEventListener('mousemove', function(e) {
                    tooltip.style.left = (e.pageX + 10) + 'px';
                    tooltip.style.top = (e.pageY + 10) + 'px';
                });
                province.addEventListener('mouseleave', function() {
                    tooltip.style.display = 'none';
                });
                province.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const provinceId = this.getAttribute('data-province');
                    showProvinceInfo(provinceId);
                    document.querySelectorAll('.province').forEach(p => p.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });
        }

        function showProvinceInfo(provinceId) {
            const province = provinceFoods[provinceId];
            const infoPanel = document.getElementById('infoPanel');
            if (!province) return;

            const foodsHTML = province.foods.map(food => `
                <div class="food-card" onclick="showFoodImage('${food.emoji}', '${food.name}')">
                    <div class="food-image">${food.emoji}</div>
                    <div class="food-name">${food.name}</div>
                    <div class="food-desc">${food.desc}</div>
                </div>
            `).join('');

            infoPanel.innerHTML = `<h2>📍 ${province.name}美食</h2><div class="food-grid">${foodsHTML}</div>`;
        }

        function showFoodImage(emoji, name) {
            const modal = document.getElementById('imageModal');
            const modalContent = document.getElementById('modalImage');
            modal.style.display = 'flex';
            modalContent.innerHTML = emoji;
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('imageModal')) {
                closeModal();
            }
        }

        document.addEventListener('DOMContentLoaded', initMap);
    </script>
