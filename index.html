    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; color: white; padding: 30px 0; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .main-content { display: grid; grid-template-columns: 1fr 400px; gap: 30px; margin-top: 30px; }
        .map-container { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .china-map { width: 100%; position: relative; }
        .china-map img { width: 100%; height: auto; display: block; }
        .province-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        .province-path {
            fill: rgba(255,255,255,0.1);
            stroke: rgba(255,255,255,0.5);
            stroke-width: 0.5;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .province-path:hover { fill: rgba(255,107,107,0.5); stroke: #ff6b6b; }
        .province-path.selected { fill: rgba(255,71,87,0.6); stroke: #ff4757; }
        .info-panel { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow-y: auto; max-height: 600px; }
        .info-panel h2 { color: #333; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 3px solid #ff6b6b; }
        .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .food-card { background: #f8f9fa; border-radius: 15px; overflow: hidden; transition: transform 0.3s; cursor: pointer; }
        .food-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .food-image { width: 100%; height: 120px; background: linear-gradient(45deg, #ff9a9e, #fad0c4); display: flex; align-items: center; justify-content: center; font-size: 3em; }
        .food-name { padding: 15px; text-align: center; font-weight: bold; color: #333; }
        .food-desc { padding: 0 15px 15px; font-size: 0.85em; color: #666; line-height: 1.4; }
        .welcome-message { text-align: center; padding: 50px 20px; color: #666; }
        .welcome-message .icon { font-size: 4em; margin-bottom: 20px; }
        .tooltip { position: absolute; background: rgba(0,0,0,0.8); color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; pointer-events: none; z-index: 100; white-space: nowrap; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: linear-gradient(45deg, #ff9a9e, #fad0c4); display: flex; align-items: center; justify-content: center; font-size: 15em; border-radius: 10px; min-width: 300px; min-height: 300px; }
        .close { position: absolute; top: 20px; right: 35px; color: #f1f1f1; font-size: 40px; font-weight: bold; cursor: pointer; z-index: 1001; }
        .close:hover { color: #ff6b6b; }
        @media (max-width: 968px) { .main-content { grid-template-columns: 1fr; } }
    </style>
</head>

        function initProvinces() {
            const svg = document.getElementById('provinceSvg');
            const tooltip = document.getElementById('tooltip');
            Object.keys(provincePaths).forEach(id => {
                const province = provinceFoods[id];
                if (!province) return;
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", provincePaths[id]);
                path.setAttribute("class", "province-path");
                path.setAttribute("data-province", id);
                path.addEventListener('mouseenter', (e) => {
                    tooltip.style.display = 'block';
                    tooltip.textContent = province.name;
                });
                path.addEventListener('mousemove', (e) => {
                    tooltip.style.left = (e.clientX + 10) + 'px';
                    tooltip.style.top = (e.clientY + 10) + 'px';
                });
                path.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
                path.addEventListener('click', function(e) {
                    e.stopPropagation();
                    showProvinceInfo(id);
                    document.querySelectorAll('.province-path').forEach(p => p.classList.remove('selected'));
                    this.classList.add('selected');
                });
                svg.appendChild(path);
            });
        }

            const foodsHTML = province.foods.map(f => `
                <div class="food-card" onclick="showFoodImage('${f.emoji}', '${f.name}')">
                    <div class="food-image">${f.emoji}</div>
                    <div class="food-name">${f.name}</div>
                    <div class="food-desc">${f.desc}</div>
                </div>
            `).join('');
            infoPanel.innerHTML = `<h2>📍 ${province.name}美食</h2><div class="food-grid">${foodsHTML}</div>`;
        }

        function showFoodImage(emoji, name) {
            document.getElementById('imageModal').style.display = 'flex';
            document.getElementById('modalImage').innerHTML = emoji;
        }

        function closeModal() { document.getElementById('imageModal').style.display = 'none'; }
        window.onclick = (e) => { if (e.target == document.getElementById('imageModal')) closeModal(); };
        document.addEventListener('DOMContentLoaded', initProvinces);
    </script>
</body>
</html>
