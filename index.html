    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            padding: 30px 0;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
            margin-top: 30px;
        }

        .map-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .china-map {
            width: 100%;
            height: 500px;
            position: relative;
        }

        .province {
            position: absolute;
            cursor: pointer;
            transition: all 0.3s ease;
            fill: #e0e0e0;
            stroke: #fff;
            stroke-width: 1;
        }

        .province:hover {
            fill: #ff6b6b;
            transform: scale(1.02);
        }

        .province.selected {
            fill: #ff4757;
        }

        .info-panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow-y: auto;
            max-height: 600px;
        }

        .info-panel h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #ff6b6b;
        }

        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .food-card {
            background: #f8f9fa;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .food-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .food-image {
            width: 100%;
            height: 120px;
            object-fit: cover;
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
        }

        .food-name {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            color: #333;
        }

        .food-desc {
            padding: 0 15px 15px;
            font-size: 0.9em;
            color: #666;
            line-height: 1.5;
        }

        .welcome-message {
            text-align: center;
            padding: 50px 20px;
            color: #666;
        }

        .welcome-message .icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        /* 地图 SVG 样式 */
        svg {
            width: 100%;
            height: 100%;
        }

        /* 响应式设计 */
        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .info-panel {
                max-height: none;
            }
        }

        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 图片模态框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

                    { name: "刀削面", emoji: "🍜", desc: "面条劲道，卤香浓郁" },
                    { name: "平遥牛肉", emoji: "🥩", desc: "色泽红润，肉质鲜嫩" },
                    { name: "莜面栲栳栳", emoji: "🍜", desc: "莜面制成，蘸料食用" },
                    { name: "陈醋", emoji: "🍶", desc: "中国四大名醋之首" }
                ]
            },
            jiangxi: {
                name: "江西",
                foods: [
                    { name: "瓦罐汤", emoji: "🍲", desc: "慢火煨制，营养丰富" },
                    { name: "拌粉", emoji: "🍜", desc: "米粉爽滑，配料丰富" },
                    { name: "藜蒿炒腊肉", emoji: "🥓", desc: "鄱阳湖特色，清香可口" },
                    { name: "三杯鸡", emoji: "🐔", desc: "一杯酒一杯油一杯酱油" }
                ]
            },
            hebei: {
                name: "河北",
                foods: [
                    { name: "驴肉火烧", emoji: "🫓", desc: "保定特色，肉香饼酥" },
                    { name: "正定八大碗", emoji: "🍲", desc: "传统宴席菜" },
                    { name: "承德避暑山庄菜", emoji: "🍽️", desc: "宫廷风味" },
                    { name: "唐山麻糖", emoji: "🍬", desc: "酥脆香甜，层次分明" }
                ]
            }
        };

        // 中国地图 SVG 路径（简化版）
        const chinaMapSVG = `

            <path class="province" data-province="yunnan" d="M350,480 L480,480 L480,580 L350,580 Z" title="云南"/>
            <path class="province" data-province="tibet" d="M200,400 L400,400 L400,550 L200,550 Z" title="西藏"/>
            
            <!-- 华南地区 -->
            <path class="province" data-province="guangdong" d="M620,540 L720,540 L720,600 L620,600 Z" title="广东"/>
            <path class="province" data-province="guangxi" d="M560,540 L640,540 L640,600 L560,600 Z" title="广西"/>

        `;

        // 初始化地图
        function initMap() {
            document.getElementById('chinaMap').innerHTML = chinaMapSVG;
            
            // 添加点击事件
            document.querySelectorAll('.province').forEach(province => {
                province.addEventListener('click', function() {
                    const provinceId = this.getAttribute('data-province');
                    showProvinceInfo(provinceId);
                    
                    // 移除其他选中状态
                    document.querySelectorAll('.province').forEach(p => p.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });
        }

        // 显示省份美食信息
        function showProvinceInfo(provinceId) {
            const province = provinceFoods[provinceId];
            const infoPanel = document.getElementById('infoPanel');
            
            if (!province) {
                infoPanel.innerHTML = `
                    <div class="welcome-message">
                        <h2>暂无数据</h2>
                        <p>该省份的美食数据正在收集中...</p>
                    </div>
                `;
                return;
            }
            
            let foodsHTML = '';
            province.foods.forEach((food, index) => {
                foodsHTML += `
                    <div class="food-card" onclick="showFoodImage('${food.emoji}', '${food.name}')">
                        <div class="food-image">${food.emoji}</div>
                        <div class="food-name">${food.name}</div>
                        <div class="food-desc">${food.desc}</div>
                    </div>
                `;
            });
            
            infoPanel.innerHTML = `
                <h2>📍 ${province.name}美食</h2>
                <div class="food-grid">
                    ${foodsHTML}
                </div>
            `;
        }

        // 显示美食图片（模态框）
        function showFoodImage(emoji, name) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modal.style.display = 'flex';
            
            // 创建放大的 emoji 显示
            modalImg.style.background = 'linear-gradient(45deg, #ff9a9e 0%, #fad0c4 100%)';
            modalImg.style.display = 'flex';
            modalImg.style.alignItems = 'center';
            modalImg.style.justifyContent = 'center';
            modalImg.style.fontSize = '15em';
            modalImg.innerHTML = emoji;
            modalImg.alt = name;
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        // 点击模态框外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('imageModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initMap);
    </script>
</body>
</html>
